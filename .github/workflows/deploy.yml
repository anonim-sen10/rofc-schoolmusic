name: Auto Deploy Laravel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validasi Secrets Wajib
        run: |
          test -n "${{ secrets.SERVER_HOST }}" || (echo "::error::Secret SERVER_HOST belum diisi" && exit 1)
          test -n "${{ secrets.SERVER_USER }}" || (echo "::error::Secret SERVER_USER belum diisi" && exit 1)
          test -n "${{ secrets.SSH_PRIVATE_KEY }}" || (echo "::error::Secret SSH_PRIVATE_KEY belum diisi" && exit 1)
          test -n "${{ secrets.SERVER_PORT }}" || (echo "::error::Secret SERVER_PORT belum diisi" && exit 1)

      - name: Deploy ke Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 120s
          command_timeout: 30m
          script_stop: true
          envs: DEPLOY_BRANCH,SERVER_APP_DIR
          script: |
            set -e

            APP_DIR="${SERVER_APP_DIR:-/home/rofcmusi/rofc-laravel}"
            BRANCH="${DEPLOY_BRANCH:-main}"

            cd "$APP_DIR"

            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            # Force production to use built assets, never Vite dev server.
            rm -f public/hot
            rm -f storage/framework/vite.hot

            composer install --no-dev --optimize-autoloader --no-interaction

            if command -v npm >/dev/null 2>&1; then
              npm ci
              npm run build
            fi

            php artisan optimize:clear

            php artisan migrate --force

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
        env:
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
