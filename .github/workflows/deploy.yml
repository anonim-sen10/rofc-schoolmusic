name: Auto Deploy Laravel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR != '' && secrets.SERVER_APP_DIR || '/home/rofcmusi/rofc-laravel' }}
      DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH != '' && secrets.DEPLOY_BRANCH || 'main' }}
      SERVER_PORT: ${{ secrets.SERVER_PORT != '' && secrets.SERVER_PORT || '22' }}
      SERVER_WEB_DIR: ${{ secrets.SERVER_WEB_DIR != '' && secrets.SERVER_WEB_DIR || '/home/rofcmusi/public_html' }}

    steps:
      - name: Validasi Secrets Wajib
        run: |
          test -n "${{ secrets.SERVER_HOST }}" || (echo "::error::Secret SERVER_HOST belum diisi" && exit 1)
          test -n "${{ secrets.SERVER_USER }}" || (echo "::error::Secret SERVER_USER belum diisi" && exit 1)
          test -n "${{ secrets.SSH_PRIVATE_KEY }}" || (echo "::error::Secret SSH_PRIVATE_KEY belum diisi" && exit 1)

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build Frontend Assets
        run: |
          npm ci
          npm run build

      - name: Buat Nama Asset Stabil
        run: |
          node -e "const fs=require('fs'); const path=require('path'); const manifest=JSON.parse(fs.readFileSync('public/build/manifest.json','utf8')); const map=[['resources/css/app.css','app.css'],['resources/js/app.js','app.js'],['resources/css/portal.css','portal.css'],['resources/js/portal.js','portal.js']]; for (const [key,targetName] of map){ const file=manifest[key]?.file; if(!file){ throw new Error('Manifest entry not found: '+key); } const src=path.join('public/build', file); const dst=path.join('public/build/assets', targetName); fs.copyFileSync(src,dst); console.log('copied', src, '=>', dst); }"

      - name: Deploy Code ke Server (Dinonaktifkan Sementara)
        run: |
          echo "Skip code sync sementara untuk memastikan asset build terbaru ter-upload dulu."

      - name: Siapkan Folder Build di Server
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ env.SERVER_PORT }}
          timeout: 120s
          command_timeout: 2m
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ env.SERVER_APP_DIR }}"
            mkdir -p "$APP_DIR/public/build/assets"

      - name: Upload Built Assets ke Laravel Public
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ env.SERVER_PORT }}
          source: public/build/*
          target: ${{ env.SERVER_APP_DIR }}/public/build
          strip_components: 2
          overwrite: true

      - name: Sync Public Folder ke Web Root
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ env.SERVER_PORT }}
          timeout: 120s
          command_timeout: 30m
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ env.SERVER_APP_DIR }}"
            WEB_DIR="${{ env.SERVER_WEB_DIR }}"

            if [ "$WEB_DIR" != "$APP_DIR/public" ]; then
              mkdir -p "$WEB_DIR"
              rsync -a --delete "$APP_DIR/public/" "$WEB_DIR/"
            fi

      - name: Refresh Laravel Cache
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ env.SERVER_PORT }}
          timeout: 120s
          command_timeout: 30m
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ env.SERVER_APP_DIR }}"
            WEB_DIR="${{ env.SERVER_WEB_DIR }}"

            cd "$APP_DIR"

            rm -f "$WEB_DIR/hot"
            rm -f storage/framework/vite.hot

            if [ "$WEB_DIR" != "$APP_DIR/public" ]; then
              rm -f "$APP_DIR/public/hot"
            fi

            php artisan optimize:clear

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
