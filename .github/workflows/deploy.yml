name: Auto Deploy Laravel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      RESOLVED_APP_DIR: ${{ secrets.SERVER_APP_DIR != '' && secrets.SERVER_APP_DIR || '/home/rofcmusi/rofc-laravel' }}
      RESOLVED_BRANCH: ${{ secrets.DEPLOY_BRANCH != '' && secrets.DEPLOY_BRANCH || 'main' }}
      RESOLVED_PORT: ${{ secrets.SERVER_PORT != '' && secrets.SERVER_PORT || '22' }}
      RESOLVED_WEB_DIR: ${{ secrets.SERVER_WEB_DIR != '' && secrets.SERVER_WEB_DIR || '/home/rofcmusi/public_html' }}

    steps:
      - name: Validasi Secrets Wajib
        run: |
          test -n "${{ secrets.SERVER_HOST }}" || (echo "::error::Secret SERVER_HOST belum diisi" && exit 1)
          test -n "${{ secrets.SERVER_USER }}" || (echo "::error::Secret SERVER_USER belum diisi" && exit 1)
          test -n "${{ secrets.SSH_PRIVATE_KEY }}" || (echo "::error::Secret SSH_PRIVATE_KEY belum diisi" && exit 1)

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build Frontend Assets
        run: |
          npm ci
          npm run build

      - name: Deploy Code ke Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ env.RESOLVED_PORT }}
          timeout: 120s
          command_timeout: 30m
          script_stop: true
          envs: DEPLOY_BRANCH,SERVER_APP_DIR,SERVER_WEB_DIR
          script: |
            set -e

            APP_DIR="${SERVER_APP_DIR:-/home/rofcmusi/rofc-laravel}"
            BRANCH="${DEPLOY_BRANCH:-main}"
            WEB_DIR="${SERVER_WEB_DIR:-$APP_DIR/public}"

            cd "$APP_DIR"

            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            # Force production to use built assets, never Vite dev server.
            rm -f public/hot
            rm -f storage/framework/vite.hot

            composer install --no-dev --optimize-autoloader --no-interaction

            php artisan migrate --force

            # If web root is outside Laravel public dir (typical shared hosting),
            # sync the public entry files so requests hit latest index + assets.
            if [ "$WEB_DIR" != "$APP_DIR/public" ]; then
              mkdir -p "$WEB_DIR"
              rsync -a --delete "$APP_DIR/public/" "$WEB_DIR/"
            fi

      - name: Siapkan Folder Build di Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ env.RESOLVED_PORT }}
          timeout: 120s
          command_timeout: 30m
          script_stop: true
          envs: SERVER_APP_DIR
          script: |
            set -e

            APP_DIR="${SERVER_APP_DIR:-/home/rofcmusi/rofc-laravel}"
            rm -rf "$APP_DIR/public/build"
            mkdir -p "$APP_DIR/public/build"

      - name: Upload Built Assets ke Laravel Public
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ env.RESOLVED_PORT }}
          source: public/build/**
          target: ${{ env.RESOLVED_APP_DIR }}/public
          strip_components: 1
          overwrite: true

      - name: Sync Public Folder ke Web Root
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ env.RESOLVED_PORT }}
          timeout: 120s
          command_timeout: 30m
          script_stop: true
          envs: SERVER_APP_DIR,SERVER_WEB_DIR
          script: |
            set -e

            APP_DIR="${SERVER_APP_DIR:-/home/rofcmusi/rofc-laravel}"
            WEB_DIR="${SERVER_WEB_DIR:-$APP_DIR/public}"

            if [ "$WEB_DIR" != "$APP_DIR/public" ]; then
              mkdir -p "$WEB_DIR"
              rsync -a --delete "$APP_DIR/public/" "$WEB_DIR/"
            fi

      - name: Refresh Laravel Cache
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ env.RESOLVED_PORT }}
          timeout: 120s
          command_timeout: 30m
          script_stop: true
          envs: SERVER_APP_DIR,SERVER_WEB_DIR
          script: |
            set -e

            APP_DIR="${SERVER_APP_DIR:-/home/rofcmusi/rofc-laravel}"
            WEB_DIR="${SERVER_WEB_DIR:-$APP_DIR/public}"

            cd "$APP_DIR"

            rm -f "$WEB_DIR/hot"
            rm -f storage/framework/vite.hot

            if [ "$WEB_DIR" != "$APP_DIR/public" ]; then
              rm -f "$APP_DIR/public/hot"
            fi

            php artisan optimize:clear

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
        env:
          DEPLOY_BRANCH: ${{ env.RESOLVED_BRANCH }}
          SERVER_APP_DIR: ${{ env.RESOLVED_APP_DIR }}
          SERVER_WEB_DIR: ${{ env.RESOLVED_WEB_DIR }}
