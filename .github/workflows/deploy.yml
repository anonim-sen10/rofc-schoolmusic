name: Auto Deploy Build to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy-build:
    runs-on: ubuntu-latest

    steps:
      - name: Validasi FTP Secrets
        run: |
          test -n "${{ secrets.FTP_SERVER }}" || (echo "::error::Secret FTP_SERVER belum diisi" && exit 1)
          test -n "${{ secrets.FTP_USERNAME }}" || (echo "::error::Secret FTP_USERNAME belum diisi" && exit 1)
          test -n "${{ secrets.FTP_PASSWORD }}" || (echo "::error::Secret FTP_PASSWORD belum diisi" && exit 1)

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build Frontend Assets
        run: |
          npm ci
          npm run build

      - name: Buat Nama Asset Stabil
        run: |
          node -e "const fs=require('fs'); const path=require('path'); const manifest=JSON.parse(fs.readFileSync('public/build/manifest.json','utf8')); const map=[['resources/css/app.css','app.css'],['resources/js/app.js','app.js'],['resources/css/portal.css','portal.css'],['resources/js/portal.js','portal.js']]; for (const [key,targetName] of map){ const file=manifest[key]?.file; if(!file){ throw new Error('Manifest entry not found: '+key); } const src=path.join('public/build', file); const dst=path.join('public/build/assets', targetName); fs.copyFileSync(src,dst); console.log('copied', src, '=>', dst); }"

      - name: Upload Build Artifacts (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: public/build/
          retention-days: 7

      - name: Deploy Build ke public_html/build via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ secrets.FTP_PROTOCOL != '' && secrets.FTP_PROTOCOL || 'ftps' }}
          port: ${{ secrets.FTP_PORT != '' && secrets.FTP_PORT || '21' }}
          local-dir: ./public/build/
          server-dir: /build/
          dangerous-clean-slate: true

      - name: Deploy Aplikasi ke rofc-laravel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ secrets.FTP_PROTOCOL != '' && secrets.FTP_PROTOCOL || 'ftps' }}
          port: ${{ secrets.FTP_PORT != '' && secrets.FTP_PORT || '21' }}
          local-dir: ./
          server-dir: /rofc-laravel/
          exclude: |
            **/.git*
            **/node_modules/**
            **/vendor/**
            **/storage/logs/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/storage/framework/cache/**
            public/build/**
            public/build.zip
            .env
            deploy_key
            scripts/deploy.mjs

      - name: Deploy Build ke rofc-laravel/public/build via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ secrets.FTP_PROTOCOL != '' && secrets.FTP_PROTOCOL || 'ftps' }}
          port: ${{ secrets.FTP_PORT != '' && secrets.FTP_PORT || '21' }}
          local-dir: ./public/build/
          server-dir: /rofc-laravel/public/build/
          dangerous-clean-slate: true

